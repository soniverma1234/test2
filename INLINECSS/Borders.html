<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
.box1{
    border: 3px solid black;
}
.box2{
    border: 3px dotted red;
}
.box3{
    border: 3px dashed blue;
}
.box4{
    border: 5px double aqua;
}
.box5{
    border: 5px groove purple;
}
.box6{
    border: 5px ridge orange;
}
.box7{
    border: 5px inset brown;
}
.box8{
    border: 5px outset teal;
}
</style>
</head>
<body>

<p class="box1">Solid Border</p>
<p class="box2">Dotted Border</p>
<p class="box3">Dashed Border</p>
<p class="box4">Double Border</p>
<p class="box5">Groove Border</p>
<p class="box6">Ridge Border</p>
<p class="box7">Inset Border</p>
<p class="box8">Outset Border</p>

</body>
</html>
